# =============================================================================
# Nginx reverse proxy config for ERP (Docker deployment)
# =============================================================================
# The Docker container serves both the API (/api/*) and frontend (/*).
# Nginx just proxies everything to the container.
#
# Copy to: /etc/nginx/sites-available/erp
# Enable:  ln -s /etc/nginx/sites-available/erp /etc/nginx/sites-enabled/erp
# Test:    nginx -t
# Reload:  systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name your-domain.com;  # Replace with your domain or server IP

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 10M;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}

# =============================================================================
# After SSL setup with certbot, it will auto-add the 443 block.
# Run: sudo certbot --nginx -d your-domain.com
# =============================================================================
